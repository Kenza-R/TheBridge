    :root {

      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --text: #e4e4e4;
      --text-muted: #777;
      --text-dim: #555;
      --accent: #6366f1;
      --accent-light: #a5b4fc;
      --green: #4ade80;
      --green-bg: #0f1f14;
      --green-border: #1e3a24;

    body {

      display: flex;
      height: 100vh;
      overflow: hidden;

    }

      border-bottom: 1px solid var(--border);
    }

    .sidebar-brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 14px;
    }

    .search-wrap { position: relative; }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 13px;
      pointer-events: none;
    }

    .search-box {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px 8px 30px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-box::placeholder { color: var(--text-dim); }
    .search-box:focus { border-color: var(--accent); }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0 20px;
    }

    .nav-label {
      padding: 14px 18px 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .nav-item {
      padding: 9px 18px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.12s;
    }

    .nav-item:hover { background: var(--surface2); }

    .nav-item.active {

      font-weight: 500;
      color: var(--text);

      color: var(--text-muted);

    }

      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .page-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

      display: flex;
      gap: 14px;
      margin-bottom: 42px;
    }

      border-radius: 10px;
      padding: 18px 22px;
      flex: 1;
    }

    .stat-num {

      font-weight: 700;
      color: var(--accent-light);

      color: var(--text-muted);
    }

      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 14px;
    }

    .cards-grid {
      display: grid;

      gap: 14px;
      margin-bottom: 44px;
    }

    .person-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      cursor: pointer;
      transition: border-color 0.15s;

    .card-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; }

      background: #1c1c2e;
      color: var(--accent-light);
      font-size: 10.5px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .themes-list { display: flex; flex-direction: column; gap: 8px; }

    .theme-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 13px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .theme-name { font-size: 13.5px; font-weight: 500; }

    .theme-right { display: flex; align-items: center; gap: 10px; }

    .theme-count {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 2px 9px;
      border-radius: 10px;
    }

    .theme-chips { display: flex; gap: 5px; }

    .theme-chip {
      font-size: 11px;
      background: #1c1c2e;
      color: var(--accent-light);
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s;
    }

    .theme-chip:hover { background: var(--accent); color: #fff; }

      padding-bottom: 24px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border);

    .iview-name { font-size: 26px; font-weight: 700; margin-bottom: 5px; }
    .iview-meta { font-size: 14px; color: var(--text-muted); margin-bottom: 14px; }

    .pnotes {
      background: var(--green-bg);
      border: 1px solid var(--green-border);
      border-radius: 10px;
      padding: 22px 26px;
      margin-bottom: 30px;
    }

    .pnotes-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 16px;
    }

    .pnotes-list { list-style: none; display: flex; flex-direction: column; gap: 9px; }

    .pnotes-list li {
      font-size: 13.5px;
      line-height: 1.65;
      color: #c8e6c9;
      padding-left: 18px;
      position: relative;
    }

    .pnotes-list li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--green);
      opacity: 0.5;
    }

    /* Meeting notes */
    .mnotes-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 18px;
    }

    .mblock { margin-bottom: 14px; }

    .mblock-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }

    .mblock-head:hover { background: var(--surface2); }

    .mblock-head.open { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom-color: transparent; }

    .chevron { font-size: 10px; color: var(--text-dim); transition: transform 0.2s; flex-shrink: 0; }
    .mblock-head.open .chevron { transform: rotate(90deg); }

    .mblock-title { font-size: 13.5px; font-weight: 600; }

    .mblock-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-bottom-left-radius: 9px;
      border-bottom-right-radius: 9px;
      padding: 18px 20px;
      display: none;
    }

    .mblock-head.open + .mblock-body { display: block; }

    .prose {
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--text-muted);
    }

    .blist { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    .blist li {
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--text-muted);
      padding-left: 16px;
      position: relative;
    }

    .blist li::before { content: '•'; position: absolute; left: 1px; color: var(--accent); }

    .topic-block {
      padding-bottom: 22px;
      margin-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }

    .topic-block:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }

    .topic-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; }

    .topic-body {
      font-size: 13px;
      line-height: 1.75;
      color: var(--text-muted);
      margin-bottom: 14px;
      white-space: pre-wrap;
    }

    .qa-list { display: flex; flex-direction: column; gap: 12px; }

    .qa-q {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--accent-light);
      margin-bottom: 5px;
    }

    .qa-a {
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--text-muted);
      padding-left: 12px;
      border-left: 2px solid var(--border);
    }

    .sresult {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 16px;
      margin-bottom: 9px;
      cursor: pointer;
      transition: border-color 0.12s;
    }

    .sresult:hover { border-color: var(--accent); }

    .sresult-who {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-light);
      margin-bottom: 4px;
    }

    .sresult-text {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-muted);
    }

    mark {
      background: rgba(99,102,241,0.28);
      color: var(--text);
      border-radius: 2px;
    }

    .empty {
      text-align: center;
      padding: 80px 0;
      color: var(--text-muted);
    }

    .empty-icon { font-size: 36px; margin-bottom: 14px; }
    .empty-text { font-size: 14px; }

    .tab-bar {
      display: flex;
      gap: 3px;
      margin-top: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 3px;
    }
    .tab {
      flex: 1;
      background: none;
      border: none;
      border-radius: 5px;
      padding: 5px 4px;
      font-size: 10.5px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--surface); color: var(--text); }

    .pnotes-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .pnotes-head .pnotes-label { margin-bottom: 0; }
    .edit-btn {
      background: none;
      border: 1px solid var(--green-border);
      color: var(--green);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 5px;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.12s, background 0.12s;
    }
    .edit-btn:hover { opacity: 1; background: rgba(74,222,128,0.07); }
    .edit-textarea {
      width: 100%;
      min-height: 260px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--green-border);
      border-radius: 7px;
      padding: 14px;
      color: #c8e6c9;
      font-size: 13.5px;
      line-height: 1.7;
      font-family: inherit;
      resize: vertical;
      outline: none;
      margin-bottom: 10px;
    }
    .edit-textarea:focus { border-color: var(--green); }
    .edit-hint { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
    .edit-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      font-size: 12px; padding: 6px 14px; border-radius: 6px; cursor: pointer;
      transition: background 0.12s;
    }
    .btn-cancel:hover { background: var(--surface2); }
    .btn-save {
      background: var(--accent); border: none; color: #fff;
      font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 6px; cursor: pointer;
      transition: background 0.12s;
    }
    .btn-save:hover { background: #818cf8; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
  </style>
</head>
<body>

  </div>
  <div class="sidebar-body" id="sidebar-body"></div>
</nav>

<main class="main" id="main"></main>

function initNav() { renderNavBody(); }

function switchTab(tab) {
  currentTab = tab;
  ['calls','speakers','interactions'].forEach(t =>

  );
  renderNavBody();
  if (tab === 'calls') showCallsHome();
  else if (tab === 'speakers') showSpeakersHome();
  else showInteractionsHome();
}

function ensureTab(tab) {
  if (currentTab === tab) return;
  currentTab = tab;
  ['calls','speakers','interactions'].forEach(t =>
    document.getElementById('tab-' + t).classList.toggle('active', t === tab)
  );
  renderNavBody();
}

//  EDIT NOTES
// ═══════════════════════════════════════════════
function pnotesHtml(person, type) {
  const label = type === 'speaker' ? 'Notes from Talk' : 'Personal Notes';
  return `
    <div class="pnotes">
      <div class="pnotes-head">
        <div class="pnotes-label">${label}</div>
        <button class="edit-btn" onclick="startEdit('${person.id}','${type}')">✎ Edit</button>
      </div>
      <ul class="pnotes-list" id="pnotes-${person.id}">
        ${person.personalNotes.map(n => `<li>${escHtml(n)}</li>`).join('')}
      </ul>
    </div>`;
}

function findPerson(id, type) {
  if (type === 'call') return interviews.find(x => x.id === id);
  if (type === 'speaker') return speakers.find(x => x.id === id);
  if (type === 'interaction') return interactions.find(x => x.id === id);
  return null;
}

function rerenderPerson(id, type) {
  if (type === 'call') showInterview(id);
  else if (type === 'speaker') showSpeaker(id);
  else showInteraction(id);
}

function startEdit(id, type) {
  const person = findPerson(id, type);
  if (!person) return;
  const el = document.getElementById('pnotes-' + id);
  if (!el) return;
  el.outerHTML = `
    <div id="pnotes-${id}">
      <div class="edit-hint">One note per line. Empty lines are ignored.</div>
      <textarea class="edit-textarea" id="edit-ta-${id}">${person.personalNotes.join('\n')}</textarea>
      <div class="edit-actions">
        <button class="btn-cancel" onclick="rerenderPerson('${id}','${type}')">Cancel</button>
        <button class="btn-save" onclick="saveEdit('${id}','${type}')">Save</button>
      </div>
    </div>`;
  document.getElementById('edit-ta-' + id).focus();
}

function saveEdit(id, type) {
  const ta = document.getElementById('edit-ta-' + id);
  if (!ta) return;
  const newNotes = ta.value.split('\n').map(s => s.trim()).filter(s => s.length > 0);
  const person = findPerson(id, type);
  if (!person) return;
  person.personalNotes = newNotes;
  try { localStorage.setItem('notes-' + id, JSON.stringify(newNotes)); } catch(e) {}
  rerenderPerson(id, type);
}

function loadSavedNotes() {
  [...interviews, ...speakers, ...interactions].forEach(p => {
    try {
      const saved = localStorage.getItem('notes-' + p.id);
      if (saved) p.personalNotes = JSON.parse(saved);
    } catch(e) {}
  });
}

    ${block('Overview', `<p class="prose">${mn.overview}</p>`)}
    ${block('Key Concepts', `<ul class="blist">${mn.keyConcepts.map(c => `<li>${c}</li>`).join('')}</ul>`)}
    ${block('Important Questions', `<ul class="blist">${mn.importantQuestions.map(q => `<li>${q}</li>`).join('')}</ul>`)}
    ${block('Key Takeaways', `<ul class="blist">${mn.keyTakeaways.map(t => `<li>${t}</li>`).join('')}</ul>`)}
    ${block('Deep Dives', mn.topics.map(topic => `
      <div class="topic-block">
        <div class="topic-title">${topic.title}</div>
        <div class="topic-body">${escHtml(topic.body)}</div>
        ${topic.qa.length ? `<div class="qa-list">${topic.qa.map(qa => `
          <div>
            <div class="qa-q">Q: ${qa.q}</div>
            <div class="qa-a">${qa.a}</div>
          </div>`).join('')}</div>` : ''}
      </div>`).join(''))}
    ${block('Next Steps', `<ul class="blist">${mn.nextSteps.map(s => `<li>${s}</li>`).join('')}</ul>`)}
    ${mn.resources && mn.resources.length ? block('Supplemental Resources', `<ul class="blist">${mn.resources.map(r => `<li><strong>${r.name}:</strong> ${r.description}</li>`).join('')}</ul>`) : ''}
    ` : ''}
  `);
}

let blockCounter = 0;
function block(title, content) {
  const id = 'blk-' + (blockCounter++);
  return `
    <div class="mblock">
      <div class="mblock-head" id="h-${id}" onclick="toggleBlock('h-${id}', 'b-${id}')">
        <span class="chevron">▶</span>
        <span class="mblock-title">${title}</span>
      </div>
      <div class="mblock-body" id="b-${id}">${content}</div>
    </div>`;
}

function toggleBlock(headId, bodyId) {
  const h = document.getElementById(headId);
  const b = document.getElementById(bodyId);
  h.classList.toggle('open');
  b.style.display = h.classList.contains('open') ? 'block' : 'none';
}

// ═══════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════
function handleSearch(raw) {
  const q = raw.trim().toLowerCase();
  if (!q) {
    if (currentTab === 'speakers') showSpeakersHome(); else showCallsHome();
    return;
  }

  const results = [];
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const rx = new RegExp(esc, 'gi');

  function push(person, text, type, kind) { results.push({ person, text, type, kind }); }

  interviews.forEach(iv => {
    iv.personalNotes.forEach(n => { if (n.toLowerCase().includes(q)) push(iv, n, 'Personal Note', 'call'); });
    if (iv.meetingNotes) {
      const mn = iv.meetingNotes;
      if (mn.overview.toLowerCase().includes(q)) {
        const idx = mn.overview.toLowerCase().indexOf(q);
        push(iv, '…' + mn.overview.substring(Math.max(0,idx-60), idx+120) + '…', 'Overview', 'call');
      }
      mn.keyTakeaways.forEach(t => { if (t.toLowerCase().includes(q)) push(iv, t, 'Key Takeaway', 'call'); });
      mn.importantQuestions.forEach(s => { if (s.toLowerCase().includes(q)) push(iv, s, 'Question', 'call'); });
      mn.keyConcepts.forEach(c => { if (c.toLowerCase().includes(q)) push(iv, c, 'Key Concept', 'call'); });
      mn.nextSteps.forEach(s => { if (s.toLowerCase().includes(q)) push(iv, s, 'Next Step', 'call'); });
      mn.topics.forEach(topic => {
        if (topic.body.toLowerCase().includes(q)) {
          const idx = topic.body.toLowerCase().indexOf(q);
          push(iv, '…' + topic.body.substring(Math.max(0,idx-60), idx+120) + '…', topic.title, 'call');
        }
        topic.qa.forEach(qa => {
          if (qa.q.toLowerCase().includes(q)) push(iv, 'Q: ' + qa.q, 'Q&A', 'call');
          if (qa.a.toLowerCase().includes(q)) {
            const idx = qa.a.toLowerCase().indexOf(q);
            push(iv, '…' + qa.a.substring(Math.max(0,idx-60), idx+120) + '…', 'Q&A', 'call');
          }
        });
      });
    }
  });

  speakers.forEach(sp => {
    sp.personalNotes.forEach(n => { if (n.toLowerCase().includes(q)) push(sp, n, 'Speaker Note', 'speaker'); });
  });

  interactions.forEach(it => {
    it.personalNotes.forEach(n => { if (n.toLowerCase().includes(q)) push(it, n, 'Interaction Note', 'interaction'); });
  });

  function hl(text) { return text.replace(rx, m => `<mark>${m}</mark>`); }

  setMain(`
    <div class="page-title" style="margin-bottom:6px">Search Results</div>
    <div class="page-sub" style="margin-bottom:28px">${results.length} result${results.length !== 1 ? 's' : ''} for "<strong>${escHtml(raw)}</strong>"</div>
    ${results.length === 0
      ? `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No results found</div></div>`
      : results.map(r => `
        <div class="sresult" onclick="${r.kind === 'speaker' ? `showSpeaker('${r.person.id}')` : r.kind === 'interaction' ? `showInteraction('${r.person.id}')` : `showInterview('${r.person.id}')`}">
          <div class="sresult-who">${r.person.name} · ${r.type}</div>
          <div class="sresult-text">${hl(escHtml(r.text))}</div>
        </div>`).join('')}
  `);
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function setMain(html) {
  const el = document.getElementById('main');
  el.innerHTML = html;
  el.scrollTop = 0;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadSavedNotes();
initNav();
showCallsHome();
